<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Professional CAD/BIM Cloud Platform for Architecture & Engineering Management - AutoCAD-style commands, layers, dimensions, 2D/3D extrusion" />
    <meta name="keywords" content="CAD, BIM, Architecture, AutoCAD, Revit, 2D, 3D, Drawing, Blueprint, Engineering" />
    <meta name="author" content="CAD/BIM Platform" />
    <meta name="theme-color" content="#1E293B" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="CAD/BIM Cloud Platform" />
    <meta property="og:description" content="Professional CAD/BIM tool with AutoCAD commands, layers, snap, and 3D extrusion" />
    <meta property="og:type" content="website" />
    
    <!-- Mobile Web App Capable -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CAD/BIM" />
    
    <title>CAD/BIM Cloud Platform - Professional Architecture & Engineering Tool</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('✅ Service Worker registered successfully:', registration.scope);
            })
            .catch(error => {
              console.log('❌ Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>

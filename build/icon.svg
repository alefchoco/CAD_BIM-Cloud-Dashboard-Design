<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#gradient)"/>
  
  <!-- Grid Pattern -->
  <g opacity="0.15">
    <line x1="128" y1="160" x2="384" y2="160" stroke="white" stroke-width="4"/>
    <line x1="128" y1="224" x2="384" y2="224" stroke="white" stroke-width="4"/>
    <line x1="128" y1="288" x2="384" y2="288" stroke="white" stroke-width="4"/>
    <line x1="128" y1="352" x2="384" y2="352" stroke="white" stroke-width="4"/>
    <line x1="160" y1="128" x2="160" y2="384" stroke="white" stroke-width="4"/>
    <line x1="224" y1="128" x2="224" y2="384" stroke="white" stroke-width="4"/>
    <line x1="288" y1="128" x2="288" y2="384" stroke="white" stroke-width="4"/>
    <line x1="352" y1="128" x2="352" y2="384" stroke="white" stroke-width="4"/>
  </g>
  
  <!-- 3D Cube Symbol -->
  <g transform="translate(256, 256)">
    <!-- Back face -->
    <path d="M -80 -40 L 0 -80 L 80 -40 L 80 40 L 0 80 L -80 40 Z" 
          fill="#64748B" stroke="white" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Top face -->
    <path d="M -80 -40 L 0 -80 L 0 0 L -80 40 Z" 
          fill="#94A3B8" stroke="white" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Right face -->
    <path d="M 0 -80 L 80 -40 L 80 40 L 0 0 Z" 
          fill="#CBD5E1" stroke="white" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Compass indicator -->
    <g transform="translate(0, -120)">
      <circle cx="0" cy="0" r="24" fill="#3B82F6"/>
      <polygon points="0,-16 -8,8 8,8" fill="white"/>
    </g>
  </g>
  
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
